name: FFVN Dispatch Send

on:
  workflow_dispatch:
  schedule:
    - cron: "50 9 * * *"
      timezone: "Asia/Ho_Chi_Minh"

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch send to target repository
        env:
          TARGET_REPO: tranducthao243/ffdatareport
          TARGET_EVENT: ffvn-send
          TARGET_PAT: ${{ secrets.TARGET_REPO_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TARGET_PAT}" \
            https://api.github.com/repos/${TARGET_REPO}/dispatches \
            -d "{\"event_type\":\"${TARGET_EVENT}\",\"client_payload\":{\"source\":\"orchestrator\"}}"
          echo "Dispatched ${TARGET_EVENT} to ${TARGET_REPO}"

