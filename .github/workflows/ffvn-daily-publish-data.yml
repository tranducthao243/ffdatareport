name: FFVN Daily Publish Data

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - FFVN Daily Fetch (Scheduled)
    types:
      - completed

permissions:
  contents: read
  actions: read

concurrency:
  group: ffvn-daily-publish-data
  cancel-in-progress: false

jobs:
  ffvn-daily-publish-data:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ffvn-reporting
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
      TARGET_ARTIFACT_NAME: ffvn-daily-fetch-latest
      TARGET_CSV_PATH: outputs/ffvn_master_latest.csv
      ALPHA_API_BASE_URL: ${{ secrets.ALPHA_API_BASE_URL }}
      ALPHA_API_KEY: ${{ secrets.ALPHA_API_KEY }}
      ALPHA_EXPERT_ID: ${{ secrets.ALPHA_EXPERT_ID }}
      ALPHA_FOLDER_ID: ${{ secrets.ALPHA_FOLDER_ID }}
      ALPHA_TAGS: ${{ secrets.ALPHA_TAGS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download fetch artifact from source run
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${SOURCE_RUN_ID}" ]]; then
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/actions/runs/${SOURCE_RUN_ID}/artifacts?per_page=100" > artifacts.json
          else
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/actions/artifacts?per_page=100" > artifacts.json
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          target_name = "ffvn-daily-fetch-latest"
          artifacts = json.loads(Path("artifacts.json").read_text(encoding="utf-8")).get("artifacts", [])
          candidates = [a for a in artifacts if a.get("name") == target_name and not a.get("expired")]
          if not candidates:
              raise SystemExit("No fetch artifact found for publish workflow.")
          candidates.sort(key=lambda x: x.get("created_at", ""), reverse=True)
          Path("artifact_id.txt").write_text(str(candidates[0]["id"]), encoding="utf-8")
          PY

          artifact_id="$(cat artifact_id.txt)"
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/artifacts/${artifact_id}/zip" > fetch_artifact.zip

          mkdir -p outputs
          python - <<'PY'
          import zipfile
          with zipfile.ZipFile("fetch_artifact.zip", "r") as zf:
              zf.extractall("outputs")
          PY

      - name: Publish CSV to Alpha Knowledge (non-blocking)
        id: publish_alpha
        if: env.ALPHA_API_BASE_URL != '' && env.ALPHA_API_KEY != '' && env.ALPHA_EXPERT_ID != ''
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import requests

          base_url = os.environ["ALPHA_API_BASE_URL"].rstrip("/")
          api_key = os.environ["ALPHA_API_KEY"]
          expert_id = os.environ["ALPHA_EXPERT_ID"]
          csv_path = Path(os.environ["TARGET_CSV_PATH"])
          folder_id = os.environ.get("ALPHA_FOLDER_ID", "").strip()
          tags = os.environ.get("ALPHA_TAGS", "").strip()

          headers = {"Authorization": f"Bearer {api_key}"}
          list_url = f"{base_url}/experts/{expert_id}/knowledges"
          upload_url = list_url

          list_resp = requests.get(list_url, headers=headers, timeout=30)
          list_resp.raise_for_status()
          entries = list_resp.json().get("knowledges", [])

          target_name = csv_path.name
          deleted = 0
          for entry in entries:
              if entry.get("name") != target_name:
                  continue
              knowledge_id = entry.get("id")
              if not knowledge_id:
                  continue
              delete_url = f"{base_url}/experts/{expert_id}/knowledges/{knowledge_id}"
              delete_resp = requests.delete(delete_url, headers=headers, timeout=30)
              if delete_resp.status_code not in (200, 404):
                  raise RuntimeError(
                      f"Alpha delete failed ({delete_resp.status_code}): {delete_resp.text[:500]}"
                  )
              deleted += 1

          form_data = {}
          if folder_id:
              form_data["folderId"] = folder_id
          if tags:
              form_data["tags"] = tags

          with csv_path.open("rb") as f:
              files = {"file": (target_name, f, "text/csv")}
              upload_resp = requests.post(upload_url, headers=headers, data=form_data, files=files, timeout=120)
          if upload_resp.status_code != 200:
              raise RuntimeError(
                  f"Alpha upload failed ({upload_resp.status_code}): {upload_resp.text[:500]}"
              )
          data = upload_resp.json()
          new_id = data.get("id")

          Path("outputs/alpha_publish_result.json").write_text(
              json.dumps(
                  {
                      "deleted_count": deleted,
                      "knowledge_id": new_id,
                      "filename": target_name,
                  },
                  ensure_ascii=False,
                  indent=2,
              ),
              encoding="utf-8",
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"deleted_count={deleted}\n")
              out.write(f"knowledge_id={new_id if new_id is not None else ''}\n")
              out.write(f"filename={target_name}\n")
          PY

      - name: Build job summary
        if: always()
        shell: bash
        run: |
          {
            echo "# FFVN Daily Publish Data"
            echo
            echo "- Event: \`${GITHUB_EVENT_NAME}\`"
            echo "- Source run id: \`${SOURCE_RUN_ID:-manual}\`"
            echo "- CSV path: \`${TARGET_CSV_PATH}\`"
            echo "- Alpha publish outcome: \`${{ steps.publish_alpha.outcome || 'skipped' }}\`"
            echo "- Alpha file name: \`${{ steps.publish_alpha.outputs.filename || '-' }}\`"
            echo "- Alpha knowledge id: \`${{ steps.publish_alpha.outputs.knowledge_id || '-' }}\`"
            echo "- Deleted old entries: \`${{ steps.publish_alpha.outputs.deleted_count || '-' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload publish debug artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ffvn-daily-publish-data-latest
          path: outputs/alpha_publish_result.json
          if-no-files-found: warn
          retention-days: 3
