name: FFVN Daily Send (Scheduled)

on:
  workflow_dispatch:
    inputs:
      send_mode:
        description: "Choose whether to send to SeaTalk or only build preview artifacts"
        required: true
        default: send
        type: choice
        options:
          - send
          - preview

permissions:
  contents: read
  actions: read

concurrency:
  group: ffvn-daily-send
  cancel-in-progress: false

jobs:
  ffvn-daily-send:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ffvn-reporting
    env:
      SEATALK_APP_ID: ${{ secrets.SEATALK_APP_ID }}
      SEATALK_APP_SECRET: ${{ secrets.SEATALK_APP_SECRET }}
      SEATALK_GROUP_ID: ${{ secrets.SEATALK_GROUP_ID }}
      SEATALK_KOL_GROUP_ID: ${{ secrets.SEATALK_KOL_GROUP_ID }}
      SEATALK_CAMPAIGN_GROUP_ID: ${{ secrets.SEATALK_CAMPAIGN_GROUP_ID }}
      SEATALK_OFFICIAL_GROUP_ID: ${{ secrets.SEATALK_OFFICIAL_GROUP_ID }}
      SEATALK_ADMIN_EMPLOYEE_CODE: ${{ secrets.SEATALK_ADMIN_EMPLOYEE_CODE }}
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      ARTIFACT_NAME: ffvn-daily-fetch-latest
      SEND_MODE: ${{ inputs.send_mode || 'send' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest fetch artifact
        shell: bash
        run: |
          set -euo pipefail

          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/artifacts?per_page=100" > artifacts.json

          python - <<'PY'
          import json
          import os
          import subprocess
          import zipfile
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          artifacts = json.loads(Path("artifacts.json").read_text(encoding="utf-8")).get("artifacts", [])
          cutoff = datetime.now(timezone.utc) - timedelta(hours=12)
          target_name = "ffvn-daily-fetch-latest"
          repo = os.environ["REPO"]
          usable_files = {
              "outputs/ffvn_master.sqlite",
              "outputs/ffvn_master_latest.csv",
              "outputs/ffvn_daily_latest.csv",
              "ffvn_master.sqlite",
              "ffvn_master_latest.csv",
              "ffvn_daily_latest.csv",
          }

          candidates = []
          for artifact in artifacts:
              if artifact.get("name") != target_name or artifact.get("expired"):
                  continue
              created_at = artifact.get("created_at")
              if not created_at:
                  continue
              created_dt = datetime.fromisoformat(created_at.replace("Z", "+00:00"))
              if created_dt >= cutoff:
                  candidates.append((created_dt, artifact["id"]))

          if not candidates:
              raise SystemExit(
                  "No recent fetch artifact found in the last 12 hours. Run FFVN Daily Fetch (Scheduled) first."
              )

          candidates.sort(reverse=True)
          selected_id = None
          selected_zip = None
          for _, artifact_id in candidates:
              zip_path = Path(f"artifact_{artifact_id}.zip")
              with zip_path.open("wb") as handle:
                  result = subprocess.run(
                      [
                          "gh",
                          "api",
                          "-H",
                          "Accept: application/vnd.github+json",
                          f"/repos/{repo}/actions/artifacts/{artifact_id}/zip",
                      ],
                      stdout=handle,
                      stderr=subprocess.PIPE,
                      text=False,
                  )
              if result.returncode != 0:
                  continue

              with zipfile.ZipFile(zip_path, "r") as zf:
                  names = set(zf.namelist())
                  if names & usable_files:
                      selected_id = artifact_id
                      selected_zip = zip_path
                      zf.extractall(".")
                      break

          if selected_id is None or selected_zip is None:
              raise SystemExit(
                  "No recent fetch artifact contained a usable CSV or SQLite store. Run FFVN Daily Fetch (Scheduled) again."
              )

          Path("artifact_id.txt").write_text(str(selected_id), encoding="utf-8")
          PY

      - name: Ensure normalized SQLite store
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f outputs/ffvn_master.sqlite ]]; then
            echo "Normalized SQLite store already present."
            exit 0
          fi

          mkdir -p outputs

          if [[ -f ffvn_master.sqlite ]]; then
            mv ffvn_master.sqlite outputs/ffvn_master.sqlite
            echo "Moved normalized SQLite store into outputs/."
            exit 0
          fi

          if [[ -f outputs/ffvn_master_latest.csv ]]; then
            export_csv="outputs/ffvn_master_latest.csv"
          elif [[ -f ffvn_master_latest.csv ]]; then
            mv ffvn_master_latest.csv outputs/ffvn_master_latest.csv
            export_csv="outputs/ffvn_master_latest.csv"
          elif [[ -f outputs/ffvn_daily_latest.csv ]]; then
            export_csv="outputs/ffvn_daily_latest.csv"
          elif [[ -f ffvn_daily_latest.csv ]]; then
            mv ffvn_daily_latest.csv outputs/ffvn_daily_latest.csv
            export_csv="outputs/ffvn_daily_latest.csv"
          else
            echo "Fetch artifact did not contain a usable CSV or SQLite store. Run FFVN Daily Fetch (Scheduled) again after updating the workflow."
            exit 1
          fi

          python -m datasocial \
            --build-master-store \
            --load-export "${export_csv}" \
            --save-store outputs/ffvn_master.sqlite \
            --report-timezone Asia/Ho_Chi_Minh

      - name: Download recent send snapshots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p outputs/history_snapshots

          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/artifacts?per_page=100" > send_artifacts.json

          python - <<'PY'
          import json
          import os
          import subprocess
          import zipfile
          from pathlib import Path

          repo = os.environ["REPO"]
          artifact_name = "ffvn-daily-send-latest"
          artifacts = json.loads(Path("send_artifacts.json").read_text(encoding="utf-8")).get("artifacts", [])
          output_dir = Path("outputs/history_snapshots")
          extracted = 0

          for artifact in sorted(artifacts, key=lambda item: item.get("created_at", ""), reverse=True):
              if artifact.get("name") != artifact_name or artifact.get("expired"):
                  continue
              artifact_id = artifact["id"]
              zip_path = Path(f"send_artifact_{artifact_id}.zip")
              with zip_path.open("wb") as handle:
                  result = subprocess.run(
                      [
                          "gh",
                          "api",
                          "-H",
                          "Accept: application/vnd.github+json",
                          f"/repos/{repo}/actions/artifacts/{artifact_id}/zip",
                      ],
                      stdout=handle,
                      stderr=subprocess.PIPE,
                      text=False,
                  )
              if result.returncode != 0:
                  continue
              with zipfile.ZipFile(zip_path, "r") as archive:
                  candidate = next((name for name in archive.namelist() if name.endswith("ffvn_daily_snapshot.json")), "")
                  if not candidate:
                      continue
                  target = output_dir / f"{artifact_id}.json"
                  target.write_bytes(archive.read(candidate))
                  extracted += 1
                  if extracted >= 8:
                      break
          print(f"downloaded_snapshots={extracted}")
          PY

      - name: Build configured reports
        run: |
          extra_args=""
          if [[ "${SEND_MODE}" == "send" ]]; then
            extra_args="--send-seatalk"
          fi

          python -m datasocial \
            --preset ffvn_master_daily \
            --build-configured-reports \
            --load-store outputs/ffvn_master.sqlite \
            --save-report outputs/ffvn_master_reports.json \
            --save-history outputs/ffvn_daily_snapshot.json \
            --load-history-dir outputs/history_snapshots \
            --save-rendered-dir outputs/rendered_reports \
            ${extra_args}

      - name: Build job summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("outputs/ffvn_master_reports.json")
          summary_path = Path("${GITHUB_STEP_SUMMARY}")
          if not path.exists():
              summary_path.write_text("FFVN daily send did not produce a JSON artifact.\n", encoding="utf-8")
              raise SystemExit(0)

          report = json.loads(path.read_text(encoding="utf-8"))
          preview_dir = Path("outputs/rendered_reports")
          preview_files = sorted(item.name for item in preview_dir.glob("*.txt")) if preview_dir.exists() else []
          lines = [
              "# FFVN Daily Send",
              "",
              "- Trigger mode: `workflow_dispatch`",
              f"- Send mode: `{os.environ.get('SEND_MODE', 'send')}`",
              f"- Generated: `{report.get('generatedAt', '-')}`",
              f"- Package count: `{report.get('packageCount', 0)}`",
              f"- Validation warnings: `{report.get('validation', {}).get('warningCount', 0)}`",
              f"- Blocked: `{report.get('summary', {}).get('blocked', 0)}`",
              f"- Sent: `{report.get('summary', {}).get('sent', 0)}`",
              f"- Skipped: `{report.get('summary', {}).get('skipped', 0)}`",
              f"- Failed: `{report.get('summary', {}).get('failed', 0)}`",
              f"- Rendered previews: `{len(preview_files)}`",
          ]
          for item in report.get("packageSummaries", []):
              lines.append(
                  f"- Package `{item.get('groupName', '-')}` -> `{item.get('reportCode', '-')}` "
                  f"({item.get('sectionCount', 0)} sections, actions={item.get('interactiveActionCount', 0)}, group_id={'yes' if item.get('hasResolvedGroupId') else 'no'})"
              )
          for item in report.get("validation", {}).get("warnings", []):
              lines.append(f"- Warning: {item.get('message', '-')}")
          for item in report.get("sendResults", []):
              lines.append(
                  f"- Send {item.get('groupName', '-')}: `{item.get('status', '-')}`"
              )
              if item.get("reason"):
                  lines.append(f"  Reason: {item.get('reason')}")
          for name in preview_files:
              lines.append(f"- Preview file: `{name}`")
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload send artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ffvn-daily-send-latest
          path: |
            outputs/ffvn_master_reports.json
            outputs/ffvn_daily_snapshot.json
            outputs/history_snapshots
            outputs/rendered_reports
          if-no-files-found: warn
