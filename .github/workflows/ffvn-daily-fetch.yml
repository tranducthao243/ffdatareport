name: FFVN Daily Fetch (Scheduled)

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ffvn-daily-fetch
  cancel-in-progress: false

jobs:
  ffvn-daily-fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: ffvn-reporting
    env:
      DATASOCIAL_GRAPHQL_ENDPOINT: https://socialdata.garena.vn/graphql
      DATASOCIAL_ORIGIN: https://socialdata.garena.vn
      DATASOCIAL_APP_ID: 2
      DATASOCIAL_APP_SLUG: ffvn
      DATASOCIAL_TIMEOUT: 300
      DATASOCIAL_USESSION: ${{ secrets.DATASOCIAL_USESSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FFVN daily fetch
        run: python -m datasocial --preset ffvn_master_daily --fetch-only

      - name: Build normalized SQLite store
        run: |
          python -m datasocial \
            --build-master-store \
            --load-export outputs/ffvn_master_latest.csv \
            --save-store outputs/ffvn_master.sqlite \
            --report-timezone Asia/Ho_Chi_Minh

      - name: Build job summary
        if: always()
        shell: bash
        run: |
          {
            echo "# FFVN Daily Fetch"
            echo
            echo "- Trigger mode: \`workflow_dispatch\`"
            echo "- Output CSV: \`outputs/ffvn_master_latest.csv\`"
            echo "- Output SQLite: \`outputs/ffvn_master.sqlite\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload fetch artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ffvn-daily-fetch-latest
          path: |
            outputs/ffvn_master_latest.csv
            outputs/ffvn_master.sqlite
          if-no-files-found: warn
